<style>
        body {
            background-color: #fcf9f4;
            color: #1c1c19;
            overflow-x: hidden;
        }
        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.03;
            background-image: url("https://www.transparenttextures.com/patterns/p6-dark.png");
        }
        .viewfinder-corners::before, .viewfinder-corners::after, 
        .viewfinder-inner::before, .viewfinder-inner::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: #DAD4C8;
            pointer-events: none;
        }
        /* Top Left */
        .viewfinder-corners::before { top: 20px; left: 20px; border-left: 1px solid; border-top: 1px solid; }
        /* Top Right */
        .viewfinder-corners::after { top: 20px; right: 20px; border-right: 1px solid; border-top: 1px solid; }
        /* Bottom Left */
        .viewfinder-inner::before { bottom: 20px; left: 20px; border-left: 1px solid; border-bottom: 1px solid; }
        /* Bottom Right */
        .viewfinder-inner::after { bottom: 20px; right: 20px; border-right: 1px solid; border-bottom: 1px solid; }

        .shutter-animation {
            animation: shutter 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes shutter {
            0% { background: transparent; }
            50% { background: white; }
            100% { background: transparent; }
        }
    </style>

<script>
        document.getElementById('capture-btn').addEventListener('click', function() {
            const flash = document.getElementById('shutter-flash');
            
            // Trigger shutter animation
            flash.classList.add('shutter-animation');
            
            // Play a subtle sound or haptic feedback simulation
            console.log('Capture triggered');
            
            // Clean up animation class
            setTimeout(() => {
                flash.classList.remove('shutter-animation');
                
                // Simulate transition to next step after brief delay
                // window.location.href = '#step3'; 
            }, 400);
        });

        // Simple parallax effect for grain to feel "alive"
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 10;
            const y = (e.clientY / window.innerHeight) * 10;
            document.querySelector('.grain-overlay').style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
